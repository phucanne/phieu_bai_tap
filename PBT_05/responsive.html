<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Product Page</title>
  <link rel="stylesheet" href="responsive.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">ShopDemo</div>

    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Deals</a>
      <a href="#">Contact</a>
    </nav>

    <div class="hamburger">☰</div>
  </header>

  <!-- LAYOUT WRAPPER -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Filter</h3>
      <label><input type="checkbox"> Giá rẻ</label>
      <label><input type="checkbox"> Cao cấp</label>
      <label><input type="checkbox"> Sale</label>
    </aside>

    <!-- MAIN PRODUCTS -->
    <main class="products">

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 1</h4>
        <p>100.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 2</h4>
        <p>200.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 3</h4>
        <p>300.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 4</h4>
        <p>400.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 5</h4>
        <p>500.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 6</h4>
        <p>600.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 7</h4>
        <p>700.000đ</p>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/300" alt="">
        <h4>Product 8</h4>
        <p>800.000đ</p>
      </div>

    </main>

    <!-- ADS -->
    <aside class="ads">
      <h3>Ads</h3>
      <p>Banner quảng cáo</p>
    </aside>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    © 2026 ShopDemo
  </footer>

</body>
</html>
