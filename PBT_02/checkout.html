<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Checkout</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        tfoot td { font-weight: bold; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Hoàn tất đơn hàng</h1>

    <!-- Giỏ hàng -->
    <h2>Giỏ hàng</h2>
    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>1</td><td>iPhone 16 Pro Max</td><td>25.990.000đ</td><td>1</td><td>25.990.000đ</td></tr>
            <tr><td>2</td><td>AirPods Pro 2</td><td>5.990.000đ</td><td>1</td><td>5.990.000đ</td></tr>
            <tr><td>3</td><td>Ốp lưng chính hãng</td><td>790.000đ</td><td>2</td><td>1.580.000đ</td></tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">Tổng cộng</td>
                <td>33.560.000đ</td>
            </tr>
        </tfoot>
    </table>

    <form action="#" method="POST">
        <!-- Thanh toán -->
        <fieldset>
            <legend>Phương thức thanh toán</legend>
            <input type="radio" id="cod" name="payment" value="cod" checked>
            <label for="cod">Thanh toán khi nhận hàng (COD)</label><br>
            <input type="radio" id="bank" name="payment" value="bank">
            <label for="bank">Chuyển khoản ngân hàng</label><br>
            <input type="radio" id="ewallet" name="payment" value="ewallet">
            <label for="ewallet">Ví điện tử (Momo, ZaloPay)</label>
        </fieldset>

        <label for="coupon">Mã giảm giá:</label>
        <input type="text" id="coupon" name="coupon" pattern="SALE[0-9]{4}" placeholder="SALE2026">

        <!-- Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="delivery_date">Ngày giao mong muốn:</label>
            <input type="date" id="delivery_date" name="delivery_date" min="2026-05-10">

            <label for="time_slot">Khung giờ:</label>
            <select id="time_slot" name="time_slot">
                <option>Sáng (8h-12h)</option>
                <option>Chiều (14h-18h)</option>
                <option>Tối (18h-21h)</option>
            </select>

            <label for="days">Thời gian giao (số ngày):</label>
            <input type="range" id="days" name="days" min="1" max="7" step="1" value="3">
            <output for="days">3 ngày</output>
        </fieldset>

        <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận đặt hàng</button>
    </form>
</body>
</html>
