<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Positioning Playground</title>
  <link rel="stylesheet" href="positioning.css">
</head>
<body>

<header class="header">

  <nav class="nav">
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
  </nav>

<div class="layout">

  <aside class="sidebar">
