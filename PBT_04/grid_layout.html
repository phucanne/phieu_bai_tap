<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Grid E-Commerce</title>
  <link rel="stylesheet" href="grid.css">
</head>
<body>

<div class="layout">

  <!-- HEADER -->
  <header class="header">HEADER</header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-grid">
      <div class="hero-item featured">Sản phẩm nổi bật</div>
      <div class="hero-item">Banner 1</div>
      <div class="hero-item">Banner 2</div>
    </div>
  </section>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Bộ lọc</h3>
    <label><input type="checkbox"> Áo</label><br>
    <label><input type="checkbox"> Quần</label><br>
    <label><input type="checkbox"> Giày</label><br>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>
    <div class="card">4</div>
    <div class="card">5</div>
    <div class="card">6</div>
  </main>

  <!-- ADS -->
  <aside class="ads">
    <img src="https://via.placeholder.com/200x400" alt="Ads">
  </aside>

  <!-- FOOTER -->
  <footer class="footer">FOOTER</footer>

</div>

</body>
</html>
